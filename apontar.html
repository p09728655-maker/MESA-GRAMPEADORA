<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Apontar · Grampeadora</title>
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Apontar">
<link rel="manifest" href="/manifest-apontar.json">
<link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111111;--surface:#1C1C1C;--elevated:#242424;--border:#2E2E2E;
  --acc:#FF5C1F;--ok:#4CAF50;--warn:#FF9800;--red:#F44336;
  --txt:#F5F5F5;--txt2:#8A8A8A;--txt3:#4A4A4A;
  --font-h:'Barlow Condensed',sans-serif;
  --font-b:'Barlow',sans-serif;
  --font-d:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font-b);overscroll-behavior:none}
body{display:flex;flex-direction:column;min-height:100dvh}

/* Topo fixo */
.top{position:sticky;top:0;z-index:10;background:var(--bg);padding:env(safe-area-inset-top) 12px 8px;border-bottom:1px solid var(--border)}
.hdr{display:flex;align-items:center;gap:9px;padding:10px 0 8px}
.hdr-logo{height:30px;width:auto;background:#fff;border-radius:6px;padding:4px 7px;flex-shrink:0;object-fit:contain}
.hdr-t{font-family:var(--font-h);font-size:17px;font-weight:700;letter-spacing:1.5px;line-height:1}
.hdr-s{font-family:var(--font-d);font-size:8px;color:var(--txt2);letter-spacing:2px;text-transform:uppercase}
.hdr-spacer{flex:1}
.badge{display:flex;align-items:center;gap:6px;font-family:var(--font-d);font-size:9px;letter-spacing:.5px;padding:5px 8px;border-radius:4px;border:1px solid var(--border);white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--txt2)}
.dot.live{background:var(--ok);animation:pulse 2s infinite}
.dot.warn{background:var(--warn)} .dot.red{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* Barra PRODUTO ATUAL */
.prod-bar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer}
.prod-bar .ico{width:34px;height:34px;border-radius:7px;background:var(--elevated);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.prod-bar .info{flex:1;min-width:0}
.prod-bar .lbl{font-family:var(--font-d);font-size:8px;color:var(--txt2);letter-spacing:2px;text-transform:uppercase}
.prod-bar .nome{font-family:var(--font-h);font-size:19px;font-weight:700;line-height:1.05;color:var(--acc);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-bar .desc{font-family:var(--font-b);font-size:11px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.prod-bar .chev{color:var(--txt2);font-size:20px;flex-shrink:0}

/* resumo do dia */
.resumo{display:flex;gap:8px;margin-top:8px}
.resumo .box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:8px 10px;text-align:center}
.resumo .v{font-family:var(--font-h);font-size:22px;font-weight:700;line-height:1}
.resumo .v.acc{color:var(--acc)}
.resumo .l{font-family:var(--font-d);font-size:8px;color:var(--txt2);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* Lista de slots */
.slots{flex:1;overflow-y:auto;padding:10px 12px calc(env(safe-area-inset-bottom) + 90px)}
.slot{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px 14px;margin-bottom:9px;position:relative;overflow:hidden}
.slot::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--txt3)}
.slot.ok::before{background:var(--ok)} .slot.warn::before{background:var(--warn)} .slot.red::before{background:var(--red)}
.slot.futura{opacity:.45}
.slot.corrente{border-color:var(--acc);background:rgba(255,92,31,.07)}
.slot-hora{font-family:var(--font-d);font-size:12px;color:var(--txt2);letter-spacing:.5px;width:74px;flex-shrink:0;line-height:1.3}
.slot.corrente .slot-hora{color:var(--acc)}
.slot-mid{flex:1;min-width:0}
.slot-real{font-family:var(--font-h);font-size:30px;font-weight:700;line-height:1}
.slot-meta{font-family:var(--font-d);font-size:10px;color:var(--txt2);letter-spacing:.5px;margin-top:2px}
.slot-lotes{font-family:var(--font-d);font-size:11px;color:var(--acc);letter-spacing:.3px;margin-top:4px;word-break:break-word;line-height:1.4}
.slot-add{flex-shrink:0;width:58px;height:58px;border-radius:12px;background:var(--acc);color:#111;border:none;font-size:30px;font-weight:700;font-family:var(--font-h);display:flex;align-items:center;justify-content:center}
.slot-add:active{transform:scale(.94)}
.slot-add.off{background:var(--elevated);color:var(--txt3)}

.ftr{position:fixed;left:0;right:0;bottom:0;padding:9px 12px calc(env(safe-area-inset-bottom) + 9px);background:linear-gradient(transparent,var(--bg) 30%);font-family:var(--font-d);font-size:10px;color:var(--txt2);text-align:center}
.pend{color:var(--warn)}

/* Modal genérico */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.86);display:none;align-items:flex-end;justify-content:center;z-index:50}
.modal.on{display:flex}
.sheet{background:var(--surface);border-top:1px solid var(--border);border-radius:18px 18px 0 0;width:100%;max-width:520px;padding:18px 16px calc(env(safe-area-inset-bottom) + 18px);animation:up .18s ease}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet h2{font-family:var(--font-h);font-size:21px;letter-spacing:.5px}
.sheet .sub{font-family:var(--font-d);font-size:11px;color:var(--txt2);margin-top:3px;letter-spacing:.5px}

/* Numpad */
.np-display{margin:16px 0;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.np-display .n{font-family:var(--font-h);font-size:58px;font-weight:700;line-height:1;color:var(--acc)}
.np-display .u{font-family:var(--font-d);font-size:11px;color:var(--txt2);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.np{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.np button{background:var(--elevated);border:1px solid var(--border);color:var(--txt);font-family:var(--font-h);font-size:28px;font-weight:700;padding:16px 0;border-radius:12px}
.np button:active{background:var(--acc);color:#111}
.np .np-del{font-size:22px}
.np-actions{display:flex;gap:10px;margin-top:12px}
.np-actions button{flex:1;font-family:var(--font-b);font-weight:700;font-size:16px;padding:15px;border-radius:12px;border:none}
.btn-p{background:var(--acc);color:#111} .btn-s{background:var(--elevated);color:var(--txt);border:1px solid var(--border)}
.btn-p:disabled{background:var(--txt3);color:var(--txt2)}
.quick{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.quick button{flex:1;min-width:60px;background:var(--elevated);border:1px solid var(--border);color:var(--txt);font-family:var(--font-h);font-size:20px;font-weight:700;padding:12px 0;border-radius:10px}
.quick button:active{background:var(--acc);color:#111}

/* Lista de produtos */
.plist{max-height:60vh;overflow-y:auto;margin-top:12px;display:flex;flex-direction:column;gap:8px}
.pitem{background:var(--elevated);border:1px solid var(--border);border-radius:11px;padding:13px 14px;cursor:pointer}
.pitem.sel{border-color:var(--acc);background:rgba(255,92,31,.10)}
.pitem .pn{font-family:var(--font-h);font-size:18px;font-weight:700;line-height:1.05}
.pitem .pd{font-family:var(--font-b);font-size:12px;color:var(--txt2);margin-top:2px}
.pitem .pb{font-family:var(--font-d);font-size:10px;color:var(--acc);letter-spacing:.5px;margin-top:3px}
.psearch{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:10px;padding:12px;font-family:var(--font-b);font-size:15px;margin-top:12px;outline:none}

.toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 100px);transform:translateX(-50%) translateY(20px);background:var(--ok);color:#0a1f0c;font-family:var(--font-b);font-weight:700;font-size:15px;padding:12px 22px;border-radius:30px;opacity:0;pointer-events:none;transition:.2s;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red);color:#fff}
</style>
</head>
<body>

<div class="top">
  <div class="hdr">
    <img class="hdr-logo" src="/logotipo-patrimar.jpg" alt="Patrimar">
    <div>
      <div class="hdr-t">APONTAR</div>
      <div class="hdr-s">Grampeadora · Jaci/SP</div>
    </div>
    <div class="hdr-spacer"></div>
    <div class="badge"><span class="dot" id="dot"></span><span id="badge-txt">…</span></div>
  </div>

  <div class="prod-bar" id="prod-bar" onclick="abrirProdutos()">
    <div class="ico">📦</div>
    <div class="info">
      <div class="lbl">Produto atual</div>
      <div class="nome" id="pb-nome">— selecione —</div>
      <div class="desc" id="pb-desc"></div>
    </div>
    <div class="chev">›</div>
  </div>

  <div class="resumo">
    <div class="box"><div class="v acc" id="rs-hoje">0</div><div class="l">painéis hoje</div></div>
    <div class="box"><div class="v" id="rs-meta">0</div><div class="l">meta até agora</div></div>
    <div class="box"><div class="v" id="rs-ader">—</div><div class="l">aderência</div></div>
  </div>
</div>

<div class="slots" id="slots">
  <div style="text-align:center;color:var(--txt2);padding:40px;font-family:var(--font-d);font-size:12px">Carregando…</div>
</div>

<div class="ftr"><span id="ftr-txt">—</span> <span class="pend" id="pend"></span></div>

<!-- Modal numpad -->
<div class="modal" id="np-modal">
  <div class="sheet">
    <h2 id="np-title">Registrar</h2>
    <div class="sub" id="np-sub">—</div>
    <div class="np-display"><div class="n" id="np-n">0</div><div class="u">painéis</div></div>
    <div class="np">
      <button onclick="npDig('1')">1</button><button onclick="npDig('2')">2</button><button onclick="npDig('3')">3</button>
      <button onclick="npDig('4')">4</button><button onclick="npDig('5')">5</button><button onclick="npDig('6')">6</button>
      <button onclick="npDig('7')">7</button><button onclick="npDig('8')">8</button><button onclick="npDig('9')">9</button>
      <button class="np-del" onclick="npDel()">⌫</button><button onclick="npDig('0')">0</button><button class="np-del" onclick="npClear()">C</button>
    </div>
    <div class="quick">
      <button onclick="npSet(1)">1</button><button onclick="npSet(10)">10</button>
      <button onclick="npSet(20)">20</button><button onclick="npSet(22)">22</button><button onclick="npSet(50)">50</button>
    </div>
    <div class="np-actions">
      <button class="btn-s" onclick="fecharNp()">Cancelar</button>
      <button class="btn-p" id="np-ok" onclick="confirmarLote()">REGISTRAR</button>
    </div>
  </div>
</div>

<!-- Modal produtos -->
<div class="modal" id="pr-modal">
  <div class="sheet">
    <h2>Produto atual</h2>
    <div class="sub">Toque no painel que está rodando</div>
    <input class="psearch" id="pr-search" type="text" placeholder="Buscar código ou nome…" oninput="filtrarProd()" autocomplete="off">
    <div class="plist" id="pr-list"></div>
    <div class="np-actions"><button class="btn-s" onclick="fecharProdutos()" style="flex:1">Fechar</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const CFG = { SHEETS_URL: 'https://script.google.com/macros/s/AKfycbx-SziFOJ9WYJeoJqWupKLXIunIVMSjsJzDygZr6YjbFKnmJvlqs5CchfhGIC-a6thWwg/exec' };
let SHEETS_URL = (new URLSearchParams(location.search).get('url') || CFG.SHEETS_URL || '').trim();

let ULTIMO = null;          // payload getDashboard
let PRODUTOS = {};          // {codigo:{batidas,descricao}}
let produtoSel = null;      // código do produto atual
let npVal = '';             // valor digitado no numpad
let _seq = 0;

// ── JSONP ──
function jsonpFetch(url){
  return new Promise((res,rej)=>{
    const cb='apt_'+Date.now()+'_'+(++_seq);
    const s=document.createElement('script');
    const t=setTimeout(()=>{ cleanup(); rej(new Error('Timeout')); },25000);
    function cleanup(){ clearTimeout(t); delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); }
    window[cb]=d=>{ cleanup(); res(d); };
    s.onerror=()=>{ cleanup(); rej(new Error('rede')); };
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    document.head.appendChild(s);
  });
}
function setBadge(e,t){ document.getElementById('dot').className='dot '+(e||''); document.getElementById('badge-txt').textContent=t; }
function toast(m,err){ const t=document.getElementById('toast'); t.textContent=m; t.className='toast on'+(err?' err':''); clearTimeout(toast._t); toast._t=setTimeout(()=>t.className='toast'+(err?' err':''),1600); }
function vibrar(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }

// ── Horários / slots ──
function parseHM(s){ const m=String(s||'').trim().match(/^(\d{1,2}):(\d{2})/); return m?(+m[1]*60+ +m[2]):null; }
function fmtHM(min){ min=((Math.round(min)%1440)+1440)%1440; const h=Math.floor(min/60),m=min%60; return (h<10?'0':'')+h+':'+(m<10?'0':'')+m; }
function nowMin(){ const d=new Date(); return d.getHours()*60+d.getMinutes()+d.getSeconds()/60; }
function buildFaixas(i,f){ const o=[]; let a=i; while(a<f){ const b=Math.min(a+60,f); o.push({ini:a,fim:b}); a=b; } return o; }
function parsePausas(s){ const o=[]; String(s||'').split(/[;,]/).forEach(p=>{ const m=p.trim().match(/^(\d{1,2}:\d{2})\s*[-–—]\s*(\d{1,2}:\d{2})$/); if(m){ const a=parseHM(m[1]),b=parseHM(m[2]); if(b>a) o.push({ini:a,fim:b}); } }); return o; }
function overlap(i,f,ps){ let t=0; ps.forEach(p=>{ const a=Math.max(i,p.ini),b=Math.min(f,p.fim); if(b>a) t+=b-a; }); return t; }

function batidasDe(cod){ return (PRODUTOS[cod] && Number(PRODUTOS[cod].batidas)) || 0; }

// ── Carregar dados ──
async function carregar(){
  if(!SHEETS_URL){ setBadge('warn','sem fonte'); return; }
  try{
    const j = await jsonpFetch(SHEETS_URL);
    if(!j || j.ok===false) throw new Error((j&&j.erro)||'erro');
    ULTIMO = j;
    PRODUTOS = j.produtos || {};
    // define produto atual: mantém se ainda existe; senão 1º da lista
    const nomes = Object.keys(PRODUTOS);
    if(!produtoSel || !PRODUTOS[produtoSel]) produtoSel = nomes[0] || null;
    setBadge('live', j.planilha||'conectado');
    render();
    document.getElementById('ftr-txt').textContent = 'atualizado '+new Date().toLocaleTimeString('pt-BR');
  }catch(e){
    setBadge(ULTIMO?'warn':'red', ULTIMO?'reconectando…':'sem conexão');
  }
}

// ── Cálculo por slot (painéis) ──
function calcularSlots(){
  const cfg = (ULTIMO&&ULTIMO.config)||{};
  const apont = (ULTIMO&&ULTIMO.apontamentos)||[];
  const metaBat = Number(cfg.meta_batidas_hora)||0;
  const verdeMin = Number(cfg.verde_min)||1, amareloMin = Number(cfg.amarelo_min)||0.85;
  const ini = parseHM(cfg.turno_inicio), fim = parseHM(cfg.turno_fim);
  const pausas = parsePausas(cfg.pausas);
  const now = nowMin();
  const faixas = (ini!=null&&fim!=null&&fim>ini)?buildFaixas(ini,fim):[];
  const batRef = batidasDe(produtoSel) || batidasDe(Object.keys(PRODUTOS)[0]) || 9;

  // agrupa apontamentos por slot (lotes = qtds)
  const lotes = faixas.map(()=>[]);
  apont.forEach(a=>{ for(let i=0;i<faixas.length;i++){ if(a.m>=faixas[i].ini && a.m<faixas[i].fim){ lotes[i].push(Number(a.qtd)||1); break; } } });

  let accMeta=0, accReal=0, hoje=0;
  apont.forEach(a=>{ hoje += Number(a.qtd)||1; });

  const rows = faixas.map((f,i)=>{
    const prodMin = (f.fim-f.ini) - overlap(f.ini,f.fim,pausas);
    const metaFull = batRef>0 ? (metaBat*prodMin/60)/batRef : 0;
    const real = lotes[i].reduce((s,x)=>s+x,0);
    let estado, metaCmp;
    if(now>=f.fim){ estado='encerrada'; metaCmp=metaFull; }
    else if(now<=f.ini){ estado='futura'; metaCmp=0; }
    else { estado='corrente'; const pd=(now-f.ini)-overlap(f.ini,now,pausas); metaCmp = batRef>0?(metaBat*Math.max(0,pd)/60)/batRef:0; }
    accMeta += (estado==='encerrada'?metaFull:estado==='corrente'?metaCmp:0);
    accReal += real;
    let cor=''; if(estado!=='futura'&&metaCmp>0){ const r=real/metaCmp; cor=r>=verdeMin?'ok':r>=amareloMin?'warn':'red'; }
    return { ini:f.ini, fim:f.fim, estado, metaFull, real, lotes:lotes[i], cor };
  });
  const ader = accMeta>0 ? accReal/accMeta : null;
  return { rows, hoje, accMeta, accReal, ader, temTurno:faixas.length>0 };
}

// ── Render ──
function fmtN(n){ return Math.round(n).toLocaleString('pt-BR'); }
function render(){
  // produto atual
  document.getElementById('pb-nome').textContent = produtoSel || '— selecione —';
  document.getElementById('pb-desc').textContent = produtoSel && PRODUTOS[produtoSel]
    ? ((PRODUTOS[produtoSel].descricao||'') + (batidasDe(produtoSel)?' · '+batidasDe(produtoSel)+' batidas':'')) : '';

  const R = calcularSlots();
  document.getElementById('rs-hoje').textContent = fmtN(R.hoje);
  document.getElementById('rs-meta').textContent = fmtN(R.accMeta);
  document.getElementById('rs-ader').textContent = R.ader==null?'—':Math.round(R.ader*100)+'%';

  const cont = document.getElementById('slots');
  if(!R.temTurno){ cont.innerHTML='<div style="text-align:center;color:var(--txt2);padding:40px;font-family:var(--font-d);font-size:12px">Turno não configurado.</div>'; return; }
  cont.innerHTML = R.rows.map((r,i)=>{
    const cls = (r.estado==='corrente'?'corrente ':r.estado==='futura'?'futura ':'')+r.cor;
    const metaTxt = 'META '+fmtN(r.metaFull)+' pnl'+(r.estado==='corrente'?' · agora':'');
    const podeLancar = r.estado!=='futura';
    return '<div class="slot '+cls+'">'
      +'<div class="slot-hora">'+fmtHM(r.ini)+'<br>'+fmtHM(r.fim)+'</div>'
      +'<div class="slot-mid"><div class="slot-real">'+fmtN(r.real)+'</div><div class="slot-meta">'+metaTxt+'</div></div>'
      +'<button class="slot-add'+(podeLancar?'':' off')+'" '+(podeLancar?'onclick="abrirNp('+i+')"':'disabled')+'>+</button>'
      +'</div>';
  }).join('');
}

// ── Numpad / lançar lote ──
let npSlotIdx = -1;
function abrirNp(i){
  if(!produtoSel){ toast('Escolha o produto primeiro',true); abrirProdutos(); return; }
  npSlotIdx = i; npVal=''; renderNp();
  const R = calcularSlots(); const r = R.rows[i];
  document.getElementById('np-title').textContent = 'Registrar · '+fmtHM(r.ini)+'–'+fmtHM(r.fim);
  document.getElementById('np-sub').textContent = produtoSel + (batidasDe(produtoSel)?' · '+batidasDe(produtoSel)+' batidas/painel':'');
  document.getElementById('np-modal').classList.add('on');
}
function renderNp(){ document.getElementById('np-n').textContent = npVal===''?'0':npVal; document.getElementById('np-ok').disabled = !(Number(npVal)>0); }
function npDig(d){ if(npVal.length<4){ npVal=(npVal+d).replace(/^0+/,''); if(npVal==='') npVal=''; renderNp(); vibrar(6);} }
function npDel(){ npVal=npVal.slice(0,-1); renderNp(); }
function npClear(){ npVal=''; renderNp(); }
function npSet(n){ npVal=String(n); renderNp(); }
function fecharNp(){ document.getElementById('np-modal').classList.remove('on'); }
function confirmarLote(){
  const q = Number(npVal)||0; if(q<=0) return;
  fecharNp();
  // otimista
  toast('+'+q+' '+produtoSel); vibrar(30);
  enfileirar({produto:produtoSel, qtd:q});
}

// ── Fila de envio ──
const fila=[]; let enviando=false;
function pend(){ document.getElementById('pend').textContent = fila.length?('· ⏳ '+fila.length+' enviando'):''; }
function enfileirar(item){ fila.push(item); pend(); flush(); }
async function flush(){
  if(enviando||!fila.length||!SHEETS_URL) return; enviando=true;
  const it=fila[0];
  try{
    const url=SHEETS_URL+(SHEETS_URL.includes('?')?'&':'?')+'action=addApontamento&produto='+encodeURIComponent(it.produto)+'&qtd='+it.qtd;
    const j=await jsonpFetch(url);
    if(!j||j.ok===false) throw new Error((j&&j.erro)||'erro');
    fila.shift(); pend(); setBadge('live','conectado');
    carregar(); // reflete na lista
  }catch(e){
    setBadge('warn','reenviando…'); setTimeout(()=>{ enviando=false; flush(); },3000); pend(); return;
  }
  enviando=false; pend(); if(fila.length) flush();
}

// ── Produtos (picker) ──
function abrirProdutos(){ document.getElementById('pr-search').value=''; renderProdList(''); document.getElementById('pr-modal').classList.add('on'); }
function fecharProdutos(){ document.getElementById('pr-modal').classList.remove('on'); }
function filtrarProd(){ renderProdList(document.getElementById('pr-search').value); }
function renderProdList(q){
  q=String(q||'').toLowerCase().trim();
  const nomes=Object.keys(PRODUTOS).filter(n=> !q || n.toLowerCase().includes(q) || String(PRODUTOS[n].descricao||'').toLowerCase().includes(q));
  const el=document.getElementById('pr-list');
  if(!nomes.length){ el.innerHTML='<div style="color:var(--txt2);font-family:var(--font-d);font-size:12px;padding:12px;text-align:center">Nenhum produto. Cadastre na aba <b>produtos</b>.</div>'; return; }
  el.innerHTML=nomes.map(n=>'<div class="pitem'+(n===produtoSel?' sel':'')+'" onclick="selProduto(\''+n.replace(/'/g,"\\'")+'\')">'
    +'<div class="pn">'+n+'</div>'
    +(PRODUTOS[n].descricao?'<div class="pd">'+PRODUTOS[n].descricao+'</div>':'')
    +'<div class="pb">'+(batidasDe(n)||'?')+' batidas/painel</div></div>').join('');
}
function selProduto(n){ produtoSel=n; fecharProdutos(); render(); vibrar(10); }

// Boot
carregar();
setInterval(carregar, 30000);
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw-grampeadora.js').catch(()=>{}); }
</script>
